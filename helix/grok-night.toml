"ui.popup.info" = { bg = "bg-menu", fg = "fg" }
"ui.selection" = { bg = "bg-selection" }
"ui.selection.primary" = { bg = "bg-selection" }
"ui.statusline" = { bg = "bg-menu", fg = "fg-secondary" }
"ui.statusline.inactive" = { bg = "bg-menu", fg = "fg-gutter" }
